<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDIO - Asistente Virtual | Experto Telcel</title>
    <meta name="description" content="CLAUDIO, tu asistente virtual experto en Telcel. Cotiza los mejores equipos y planes.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="chatbot-wrapper">
        <!-- Chat Header -->
        <header class="chat-header">
            <div class="chat-header-info">
                <div class="bot-avatar">
                    <i class="fa-solid fa-robot"></i>
                    <div class="online-indicator"></div>
                </div>
                <div class="bot-details">
                    <h1>CLAUDIO</h1>
                    <p>Asistente de Efraín II Cárdenas</p>
                </div>
            </div>
            <div class="chat-header-actions">
                <a href="https://expertotelcel.com/" target="_blank" title="Visitar eXpertoTelceL.com">
                    <i class="fa-solid fa-globe"></i>
                </a>
            </div>
        </header>

        <!-- Chat Messages Area -->
        <main class="chat-messages" id="chat-messages">
            <!-- Messages will be injected here by app.js -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
        </main>

        <!-- Chat Input Area -->
        <footer class="chat-input-area">
            <!-- Dynamic Options Menu (Buttons) -->
            <div class="chat-options" id="chat-options"></div>
            
            <!-- Text Input -->
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off" disabled>
                <button type="submit" id="chat-submit" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <!-- App Logic -->
    <script src="js/app.js?v=2"></script>
</body>
</html>
